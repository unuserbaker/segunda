DescripciГіn de los directorios:
service1, service2, etc.: Cada microservicio tiene su propio directorio con su propia estructura interna.

src/: Contiene el cГіdigo fuente del microservicio.
controllers/: Controladores que manejan las solicitudes HTTP.
models/: Modelos de datos, generalmente para bases de datos.
routes/: Definiciones de rutas y endpoints.
services/: LГіgica de negocio y servicios.
index.js: Punto de entrada del microservicio.
tests/: Pruebas unitarias y de integraciГіn.
config/: Archivos de configuraciГіn especГӯficos del microservicio.
Dockerfile: Archivo Docker para contenerizar el microservicio.
package.json: Dependencias y scripts del microservicio.
README.md: DocumentaciГіn especГӯfica del microservicio.
gateway/: Servicio de puerta de enlace (gateway) que maneja la comunicaciГіn entre los microservicios y los clientes.

Estructura similar a la de los microservicios.
common/: CГіdigo compartido entre los microservicios.

middleware/: Middleware reutilizable.
utils/: Utilidades y funciones comunes.
config/: Configuraciones compartidas.
docker-compose.yml: Archivo para orquestar los contenedores Docker de todos los microservicios.

README.md: DocumentaciГіn general del proyecto.

