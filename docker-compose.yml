version: '3.9'

# ─────────────────────────────────────────────
# Cada microservicio tiene su propia base de datos.
# Patrón: Database-per-Service
# ─────────────────────────────────────────────

services:

  # ── API Gateway ────────────────────────────
  # gateway:
  #   build:
  #     context: ./gateway_service
  #   container_name: gateway
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     NODE_ENV: production
  #     VEHICLES_SERVICE_URL: http://vehicles:3005
  #   depends_on:
  #     - vehicles
  #   networks:
  #     - backend

  # ── Vehicles Microservice ──────────────────
  # vehicles:
  #   build:
  #     context: ./vehicles_service
  #   container_name: vehicles_service
  #   ports:
  #     - "3005:3005"
  #   environment:
  #     NODE_ENV: production
  #     PORT_APP: 3005
  #     DB_HOST: vehicles_db       # nombre del contenedor de su propia BD
  #     DB_PORT: 5432
  #     DB_DIALECT: postgres
  #     DB_NAME: vehicles_db
  #     DB_USER: vehicles_user
  #     PGPASSWORD: vehicles_pass
  #     DB_SCHEMA_ONE: public
  #   depends_on:
  #     vehicles_db:
  #       condition: service_healthy
  #   networks:
  #     - backend

  # ── PostgreSQL exclusiva de vehicles ───────
  vehicles_db:
    image: postgres:16-alpine
    container_name: vehicles_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vehicles_db
      POSTGRES_USER: vehicles_user
      POSTGRES_PASSWORD: vehicles_pass
    ports:
      - "5433:5432"
    volumes:
      - vehicles_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vehicles_user -d vehicles_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ─────────────────────────────────────────────
  # Cuando agreguéis un nuevo microservicio, repetid
  # el bloque de arriba:
  #
  # orders:
  #   build: ./orders_service
  #   environment:
  #     DB_HOST: orders_db
  #     ...
  #   depends_on:
  #     orders_db:
  #       condition: service_healthy
  #
  # orders_db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_DB: orders_db
  #     POSTGRES_USER: orders_user
  #     POSTGRES_PASSWORD: orders_pass
  #   volumes:
  #     - orders_db_data:/var/lib/postgresql/data
  # ─────────────────────────────────────────────

volumes:
  vehicles_db_data:
  # orders_db_data:     # descomentar al añadir nuevos servicios

networks:
  backend:
    driver: bridge
