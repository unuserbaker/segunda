version: '3.9'

# ─────────────────────────────────────────────
# Modular Monolith + PostgreSQL
# ─────────────────────────────────────────────

services:

  # ── Backend (Modular Monolith) ────────────
  backend:
    build:
      context: ./backend
    container_name: backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: backend_user
      DB_PASSWORD: backend_pass
      DB_DATABASE: backend_db
      JWT_SECRET: ${JWT_SECRET:-segunda-jwt-secret-prod}
      JWT_EXPIRES_IN: 7d
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  # ── PostgreSQL única ──────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: backend_db
      POSTGRES_USER: backend_user
      POSTGRES_PASSWORD: backend_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backend_user -d backend_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Frontend ─────────────────────────────
  main_client:
    build:
      context: ./main_client
    container_name: main_client
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
